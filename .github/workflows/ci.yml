name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        node: [20]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install macOS system deps for node-hid
        if: runner.os == 'macOS'
        run: brew install hidapi pkg-config

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm ci --ignore-scripts --no-audit --no-fund

      - name: Smoke check
        run: npm run smoke
