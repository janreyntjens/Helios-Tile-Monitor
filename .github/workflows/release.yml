name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Smoke check
        run: npm run smoke

      - name: Build single-file exe
        run: npm run build:exe

      - name: Create source archive
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP\helios-monitor-windows-${{ github.ref_name }}.zip"
          Compress-Archive -Path package.json,package-lock.json,README.md,start-helios-monitor.bat,public,src,api_docs,logo.ico -DestinationPath $zip
          Get-ChildItem $env:RUNNER_TEMP
          Get-ChildItem dist

      - name: Stage exe with version-named filename
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $stripped = $version.TrimStart('v')
          $src = "dist/helios-monitor-$stripped.exe"
          $dst = "$env:RUNNER_TEMP/helios-monitor-windows-$version.exe"
          if (-not (Test-Path $src)) { throw "exe not found at $src" }
          Copy-Item $src $dst -Force
          Get-Item $dst | Format-List Name,Length

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ runner.temp }}/helios-monitor-windows-${{ github.ref_name }}.zip
            ${{ runner.temp }}/helios-monitor-windows-${{ github.ref_name }}.exe
          fail_on_unmatched_files: true