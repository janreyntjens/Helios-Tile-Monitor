name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Smoke check
        run: npm run smoke

      - name: Create archive
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP\helios-monitor-windows-${{ github.ref_name }}.zip"
          Compress-Archive -Path package.json,package-lock.json,README.md,start-helios-monitor.bat,public,src,api_docs -DestinationPath $zip
          Get-ChildItem $env:RUNNER_TEMP

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ runner.temp }}/helios-monitor-windows-${{ github.ref_name }}.zip
          fail_on_unmatched_files: true